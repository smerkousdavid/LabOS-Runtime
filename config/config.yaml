# =============================================================================
# LabOS XR Runtime -- Desktop Application Configuration
#
# Edit this file to configure your runtime. Then run:
#   ./run.sh          (Linux/macOS)
#   run.bat           (Windows)
# =============================================================================

# ---------------------------------------------------------------------------
# NAT Server -- external agent server connection
# Set this to the WebSocket URL of your NAT server.
# ---------------------------------------------------------------------------
nat_server:
  url: "ws://localhost:8002/ws"           # e.g. ws://192.168.1.100:8002/ws

# ---------------------------------------------------------------------------
# XR Runtime -- streaming, video, gRPC
# ---------------------------------------------------------------------------
runtime:
  num_cameras: 1
  streaming:
    method: mediamtx                      # mediamtx | gstreamer
    framerate: 30
    mediamtx_port: 8554
    mediamtx_service_name: mediamtx

# ---------------------------------------------------------------------------
# Speech services -- STT and TTS endpoints (external)
# Point these to wherever your STT/TTS models are running.
# ---------------------------------------------------------------------------
speech:
  stt:
    protocol: grpc                          # grpc | grpc-batch | http | vllm | parakeet_ws | elevenlabs_realtime
    host: "localhost"
    port: 50051
    model: "parakeet-1.1b-en-US-asr-streaming"
    # language: "en"
    # commit_interval_s: 0.3
    # min_speech_duration_ms: 100
    min_silence_duration_ms: 300
    # include_timestamps: true
    # fallback_recover_after_s: 30
    # fallback:
    #   protocol: grpc
    #   host: "localhost"
    #   port: 50051
    #   model: "parakeet-1.1b-en-US-asr-streaming"
    # noise_correction:
    #   enabled: true
    #   gate_rms: 120
    #   suppression_terms:
    #     - mhm
    #     - mm
    #     - mmm
    #     - hmm
    #     - hm
    #     - uh
    #     - um
    #     - oh
    #     - uh-huh
    #     - mm-hmm
    #     - "mhm mhm"
    #     - "so so"
    #   spam_guard_window_s: 1.0
    # endpointing:
    #   start_history: 0
    #   start_threshold: 0.0
    #   stop_history: 0
    #   stop_threshold: 0.0
    #   stop_history_eou: 0
    #   stop_threshold_eou: 0.0

  tts:
    enabled: true
    provider: elevenlabs                  # riva | qwen | vibevoice | elevenlabs
    riva:
      host: riva-server
      port: 50051
    qwen:
      base_url: https://dashscope.aliyuncs.com/api/v1
      api_key_env: DASHSCOPE_API_KEY
    vibevoice:
      host: "localhost"                   # TTS server hostname or IP
      port: 8050
    elevenlabs:
      voice_id: "pNInz6obpgDQGcFmaJgB"       # Adam pre-made voice
      model_id: "eleven_multilingual_v2"

# ---------------------------------------------------------------------------
# Dashboard -- local web UI
# ---------------------------------------------------------------------------
dashboard:
  port: 5001

# ---------------------------------------------------------------------------
# NVR (Shinobi) -- optional video recording
# ---------------------------------------------------------------------------
nvr:
  enabled: false
  port: 8088
  credentials:
    email: viture@test.com
    password: test1234
  shinobi:
    group_key: KpM6j63XY7
    unique_id: 8N8ngH8WUt
    api_key: eTJceyxeZWnaGqUKx1Asw0u3m29frk
    storage_size: 300000

# ---------------------------------------------------------------------------
# Features
# ---------------------------------------------------------------------------
features:
  fast_path_enabled: false              # bypass LLM for "next step"/"previous step"

# ---------------------------------------------------------------------------
# Video frame streaming (over NAT WebSocket)
# ---------------------------------------------------------------------------
frame_streaming:
  enabled: true                           # push frames over WS for STELLA VLM
  width: 384
  height: 384
  fps: 2

# ---------------------------------------------------------------------------
# LabOS Live Session -- QR code scanning and RTSP relay
# ---------------------------------------------------------------------------
labos_live:
  initial_qr_code: false                  # show QR scanning prompt on XR startup

# ---------------------------------------------------------------------------
# RTSP external access
# ---------------------------------------------------------------------------
rtsp:
  external_host: "auto"                   # "auto" detects Tailscale/LAN IP; or set a fixed IP

# ---------------------------------------------------------------------------
# Recording -- MediaMTX auto-records when glasses connect
# ---------------------------------------------------------------------------
recording:
  enabled: true                           # record streams when active
  format: fmp4                            # fmp4 | mpegts
  segment_duration: 60m                   # segment duration (e.g., 60m, 1h)
  path: "./recordings"                    # host-side path for recorded files

# ---------------------------------------------------------------------------
# Wake word settings (for voice bridge)
# ---------------------------------------------------------------------------
wakeword:
  words:
    - stella
    - hey stella
    - hi stella
  timeout_seconds: 10
  sleep_commands:
    - thanks
    - goodbye
    - go to sleep

# ---------------------------------------------------------------------------
# Robot runtime -- optional robotic arm integration
# ---------------------------------------------------------------------------
robot:
  enabled: false                          # set to true to include robot in compose stack
  xarm_ip: "192.168.1.185"               # xArm controller IP address
  no_vision: false                        # true = skip RealSense camera (headless mode)
  session_id: "robot-1"                   # WebSocket session identifier

# ---------------------------------------------------------------------------
# Session management
# ---------------------------------------------------------------------------
session:
  reset_on_disconnect: ask    # true | false | ask

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  secrets_file: config/.env.secrets
